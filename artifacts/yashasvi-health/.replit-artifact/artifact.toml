kind = "web"
previewPath = "/"
title = "Yashasvi Health Care"
version = "1.0.0"
id = "artifacts/yashasvi-health"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25515

[services.development]
run = "pnpm --filter @workspace/yashasvi-health run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/yashasvi-health", "run", "build" ]
publicDir = "artifacts/yashasvi-health/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25515"
BASE_PATH = "/"
